<div class="login-wrapper">
    <div class="login-background">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="noise-overlay"></div>
    </div>

    <main class="login-container">
        <div class="login-card">
            <header class="login-header">
                <div class="logo-mark">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <!-- Sun rays/glow -->
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.4" />
                        <!-- Cactus -->
                        <path d="M12 6v12" />
                        <path d="M12 9a3 3 0 0 0-3 3v2" />
                        <path d="M12 11a3 3 0 0 1 3 3v1" />
                        <!-- Soil Line -->
                        <path d="M7 18h10" stroke-width="1.5" />
                    </svg>
                </div>
                <h2>Raízes do Nordeste</h2>
                <p>Acesso Restrito</p>
            </header>

            <form class="login-form" (submit)="onLogin($event)">
                <div class="input-group">
                    <label for="login">Login</label>
                    <div class="input-wrapper">
                        <input type="text" id="login" name="login" placeholder="USER" [(ngModel)]="formLogin" required>
                        <div class="input-border"></div>
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Senha</label>
                        <a href="#" class="forgot-link">Esqueci a senha</a>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" [(ngModel)]="formPasskey" required autocomplete="current-password">
                        <div class="input-border"></div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Entrar no Sistema</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14"></path>
                        <path d="M12 5l7 7-7 7"></path>
                    </svg>
                </button>
            </form>

            <footer class="login-footer">
                <p>&copy; 2026 Raízes do Nordeste CRM. Todos os direitos reservados.</p>
            </footer>
        </div>
    </main>
</div>
