@if (!isPublicPage()) {
<div class="app-shell">
    <app-sidebar />
    <div class="main-content">
        <router-outlet />
    </div>
</div>
} @else {
<router-outlet />
}



<!-- Alert Message -->
@if (alert.showAlertMessage() !== null) {
<div class="modal-overlay z-10000" (click)="alert.close()">
    <div class="modal-box modal-sm" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>Aviso</h2>
        </div>
        <div class="modal-body">
            <p class="delete-warning">{{ alert.showAlertMessage() }}</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" (click)="alert.close()">Entendi</button>
        </div>
    </div>
</div>
}
