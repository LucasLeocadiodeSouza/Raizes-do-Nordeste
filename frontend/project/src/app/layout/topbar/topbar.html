<header class="topbar">
    <div class="topbar-left">
        <h2 class="page-title">{{ pageTitle() }}</h2>
        <nav class="breadcrumb" aria-label="Breadcrumb">
            <span>Raízes do Nordeste CRM</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">{{ pageTitle() }}</span>
        </nav>
    </div>

    <div class="topbar-right">
        <div class="user-chip-wrapper">
            <div class="user-chip" (click)="toggleDropdown()" [class.active]="dropdownOpen()">
                <div class="chip-avatar"> {{ user()!.username!.substring(0, 1) }} </div>
                <span class="chip-name">{{ user()!.username }}</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" class="dropdown-icon" [style.transform]="dropdownOpen() ? 'rotate(180deg)' : 'rotate(0)'">
                    <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </div>

            @if (dropdownOpen()) {
            <div class="user-dropdown">
                <div class="dropdown-header">
                    <span class="user-name">{{ user()!.username }}</span>
                    <span class="user-role">{{ user()!.perfil }}</span>
                </div>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" (click)="logout()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="item-icon">
                        <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                    Sair da conta
                </button>
            </div>
            }
        </div>
    </div>
</header>
